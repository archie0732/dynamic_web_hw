<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ info.name }} - 個人資料</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f0f2f5;
      }
      .detail-card {
        border-radius: 15px;
        overflow: hidden;
        border: none;
      }
      .info-label {
        font-weight: bold;
        color: #6c757d;
        width: 100px;
        display: inline-block;
      }
      .info-value {
        color: #212529;
        font-size: 1.1rem;
      }
      .back-btn {
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card detail-card shadow">
            <div class="card-header bg-primary text-white py-4">
              <div class="d-flex align-items-center">
                <div
                  class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center"
                  style="width: 80px; height: 80px; font-size: 2rem"
                >
                  {{ info.name[0] }}
                </div>
                <div class="ms-4">
                  <h2 class="mb-1">{{ info.name }}</h2>
                  <p class="mb-0 text-white-50">學號: {{ info.id }}</p>
                </div>
              </div>
            </div>

            <div class="card-body p-4">
              <h5 class="text-muted mb-4">詳細資料</h5>

              <div class="mb-3">
                <span class="info-label">核心職責</span>
                <span class="badge bg-success info-value">{{ info.role }}</span>
              </div>

              <div class="mb-3">
                <span class="info-label">電子郵件</span>
                <span class="info-value text-primary">{{ info.email }}</span>
              </div>

              {% if info.notes %}
              <div class="mb-3">
                <span class="info-label">備註</span>
                <p
                  class="info-value text-muted mt-2 px-3 py-2 border rounded bg-light"
                >
                  {{ info.notes }}
                </p>
              </div>
              {% endif %}

              <hr class="my-4" />

              <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-outline-secondary back-btn px-4"
                  >← 回到名單</a
                >
                <button
                  class="btn btn-primary px-4"
                  onclick="alert('聯絡功能尚未實作')"
                >
                  傳送郵件
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
